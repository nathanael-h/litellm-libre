name: build-release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream LiteLLM tag to build (e.g. v1.92.0-stable)"
        required: true
        type: string
      libre_counter:
        description: "Libre counter suffix (defaults to 1)"
        required: false
        type: string
        default: "1"

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      failed_step: ${{ steps.trace.outputs.failed_step }}
      diagnostics: ${{ steps.trace.outputs.diagnostics }}
    steps:
      - name: Checkout libre repo
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"

      - name: Fetch upstream tag
        id: fetch
        run: scripts/fetch-upstream.sh "${{ inputs.upstream_tag }}" ./build

      - name: Strip enterprise tree
        id: strip
        run: scripts/strip-enterprise.sh ./build

      - name: Apply libre patches
        id: apply
        run: scripts/apply-patches.sh ./build

      - name: Verify (static + import)
        id: verify
        run: scripts/verify.sh ./build

      - name: Build wheel + sdist
        id: uvbuild
        env:
          BUILD_DOCKER: "0"
        run: |
          upstream="${{ inputs.upstream_tag }}"
          base="${upstream#v}"; base="${base%-stable}"
          # PEP 440 local-version segment ('+') for the Python wheel/sdist.
          libre_ver="${base}+libre.${{ inputs.libre_counter }}"
          # Docker/OCI tags and git refs forbid '+', so use '-' there instead.
          docker_tag="${base}-libre.${{ inputs.libre_counter }}"
          scripts/build.sh ./build "$libre_ver"
          echo "libre_ver=$libre_ver"   >> "$GITHUB_OUTPUT"
          echo "docker_tag=$docker_tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./build
          file: ./build/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.uvbuild.outputs.docker_tag }}
            ghcr.io/${{ github.repository }}:stable
            ghcr.io/${{ github.repository }}:latest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.uvbuild.outputs.docker_tag }}
          name: v${{ steps.uvbuild.outputs.docker_tag }}
          body: |
            Libre (MIT-only) build of [BerriAI/litellm@${{ inputs.upstream_tag }}](https://github.com/BerriAI/litellm/releases/tag/${{ inputs.upstream_tag }})
            with the proprietary `enterprise/` tree stripped and the SSO user-count gate removed.

            **Artifacts**
            - Python: `${{ steps.uvbuild.outputs.libre_ver }}` — wheel + sdist attached below
            - Docker: `ghcr.io/${{ github.repository }}:${{ steps.uvbuild.outputs.docker_tag }}` (also tagged `:stable`, `:latest`)

            **What changed vs upstream** — the enterprise runtime dependency and
            packaging are removed, the enterprise Docker copies and admin-UI build
            step are dropped, and the SSO free-tier user gate is removed. See
            [PLAN.md](https://github.com/${{ github.repository }}/blob/main/PLAN.md)
            for the exact patch set.

            **Upstream changelog** — this build tracks upstream **${{ inputs.upstream_tag }}**;
            for the features and fixes in the underlying release see the upstream
            release notes: https://github.com/BerriAI/litellm/releases/tag/${{ inputs.upstream_tag }}

            > ⚠️ **Enterprise features are not available.** The proprietary
            > `litellm-enterprise` package is removed from this build, so anything
            > upstream gates behind a LiteLLM Enterprise license or ships only in
            > that package (enterprise hooks, custom admin-UI theming, license-gated
            > SSO limits, etc.) is disabled or silently no-ops. The OSS core proxy
            > and its features are unaffected.
          files: ./build/dist/*

      - name: Update UPSTREAM
        run: |
          echo "${{ inputs.upstream_tag }}" > UPSTREAM
          git config user.name  libre-bot
          git config user.email libre-bot@users.noreply.github.com
          git add UPSTREAM
          git diff --cached --quiet || git commit -m "chore: track ${{ inputs.upstream_tag }}"
          git push

      - name: Capture failure context
        id: trace
        if: failure()
        run: |
          # First failing step, in pipeline order (steps.<id>.outcome).
          echo "failed_step=${{ steps.apply.outcome == 'failure' && 'apply' ||
                                 steps.verify.outcome == 'failure' && 'verify' ||
                                 steps.strip.outcome == 'failure' && 'strip' ||
                                 steps.fetch.outcome == 'failure' && 'fetch' ||
                                 steps.uvbuild.outcome == 'failure' && 'build' || 'unknown' }}" \
            >> "$GITHUB_OUTPUT"

          # Diagnostics: the patch-apply failure log + rejected hunks if present,
          # otherwise a pointer to the run log. Cap at ~50k so the issue body
          # (GitHub limit 65536) can never overflow.
          {
            echo 'diagnostics<<REJEOF'
            if [ -d ./build/.libre-rejects ]; then
              # Buffer to a file first, then head that file: piping straight into
              # `head` would SIGPIPE the producer and fail the step under pipefail.
              diag="$(mktemp)"
              find ./build/.libre-rejects -type f | sort | while IFS= read -r f; do
                printf '===== %s =====\n' "${f#./build/.libre-rejects/}"
                cat "$f"
                printf '\n'
              done > "$diag"
              head -c 50000 "$diag"
              rm -f "$diag"
            else
              echo "(no patch rejects; failure was before/after the apply step -- see the run log)"
            fi
            echo
            echo REJEOF
          } >> "$GITHUB_OUTPUT"

  open-drift-issue:
    needs: build
    if: failure()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Open (or update) patch-drift issue
        uses: actions/github-script@v8
        env:
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          FAILED_STEP:  ${{ needs.build.outputs.failed_step }}
          DIAGNOSTICS:  ${{ needs.build.outputs.diagnostics }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.UPSTREAM_TAG;
            const step = process.env.FAILED_STEP || 'unknown';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `patch drift: build failed at ${tag}`;
            // The report excludes the run URL so identical failures compare equal
            // (see the dedup check below); the URL is appended separately.
            const report = [
              `Upstream tag: **${tag}**`,
              `Failed step: **${step}**`,
              ``,
              `Diagnostics (failed patch, \`git apply\` errors, rejected hunks):`,
              '```',
              (process.env.DIAGNOSTICS || '(none captured)').trim(),
              '```',
              ``,
              `Fix: regenerate the failing patch against \`${tag}\` (trigger`,
              `\`ai-fix.yml\`, or do it by hand), open a PR, and merge. The next`,
              `\`watch-upstream\` run will re-dispatch the build once this issue closes.`,
            ].join('\n');
            const body = `${report}\n\n[Failed run log](${runUrl})`;

            const q = `repo:${owner}/${repo} in:title is:issue is:open label:patch-drift`;
            const found = await github.rest.search.issuesAndPullRequests({ q });
            const existing = found.data.items.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['patch-drift'] });
              return;
            }
            // Don't pile identical reports onto the same issue: only comment when
            // the diagnostics changed since the last report (issue body or the
            // most recent comment). The run-URL line is stripped before comparing.
            const strip = s => (s || '').replace(/\n\n\[Failed run log\]\([^)]*\)\s*$/, '').trim();
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: existing.number, per_page: 100,
            });
            const last = comments.data.length
              ? comments.data[comments.data.length - 1].body
              : existing.body;
            if (strip(last) === strip(body)) {
              core.info(`Identical drift report already on #${existing.number}; not commenting again.`);
              return;
            }
            await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
