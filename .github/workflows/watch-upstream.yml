name: watch-upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  detect:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Find latest upstream -stable tag
        id: find
        uses: actions/github-script@v8
        with:
          script: |
            const { data: tags } = await github.rest.repos.listTags({
              owner: 'BerriAI',
              repo: 'litellm',
              per_page: 100,
            });
            const stable = tags.map(t => t.name).filter(n => /^v\d+\.\d+\.\d+-stable$/.test(n));
            if (stable.length === 0) {
              core.setFailed('no upstream -stable tag matched v*-stable');
              return;
            }
            const sortKey = n => n.slice(1, -('-stable'.length)).split('.').map(Number);
            stable.sort((a, b) => {
              const av = sortKey(a);
              const bv = sortKey(b);
              for (let i = 0; i < 3; i++) if (av[i] !== bv[i]) return bv[i] - av[i];
              return 0;
            });
            core.setOutput('latest', stable[0]);

      - name: Compare with UPSTREAM file
        id: compare
        run: |
          latest="${{ steps.find.outputs.latest }}"
          current="$(cat UPSTREAM)"
          echo "latest=$latest"    >> "$GITHUB_OUTPUT"
          echo "current=$current"  >> "$GITHUB_OUTPUT"
          if [ "$latest" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch build-release
        if: steps.compare.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'build-release.yml',
              ref: context.ref,
              inputs: { upstream_tag: '${{ steps.compare.outputs.latest }}' },
            });
