name: watch-upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: read

jobs:
  detect:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Find latest upstream stable tag
        id: find
        uses: actions/github-script@v8
        with:
          script: |
            // Upstream stable tags come in two shapes:
            //   - new scheme (>= 1.84.0): plain SemVer, e.g. "v1.91.0" / "v1.91.1" (hotfix)
            //   - old scheme (<= 1.83.x): the "-stable" suffix, e.g. "v1.83.14-stable"
            // Pre-releases (-rc.N, -dev.N, -nightly) and old Docker-only hotfixes
            // (-stable.patch.N) are NOT stable and must be excluded.
            // https://docs.litellm.ai/docs/proxy/release_cycle
            const isStable = n => /^v\d+\.\d+\.\d+(-stable)?$/.test(n);
            // Paginate: frequent dev/rc tags can push a stable off the first page.
            const maxPages = 5, perPage = 100;
            const stable = [];
            for (let page = 1; page <= maxPages; page++) {
              const { data: tags } = await github.rest.repos.listTags({
                owner: 'BerriAI', repo: 'litellm', per_page: perPage, page,
              });
              stable.push(...tags.map(t => t.name).filter(isStable));
              if (tags.length < perPage) break;
            }
            if (stable.length === 0) {
              core.setFailed('no upstream stable tag matched vX.Y.Z or vX.Y.Z-stable');
              return;
            }
            const sortKey = n => n.replace(/^v/, '').replace(/-stable$/, '').split('.').map(Number);
            stable.sort((a, b) => {
              const av = sortKey(a);
              const bv = sortKey(b);
              for (let i = 0; i < 3; i++) if (av[i] !== bv[i]) return bv[i] - av[i];
              return 0;
            });
            core.setOutput('latest', stable[0]);

      - name: Compare with UPSTREAM file
        id: compare
        run: |
          latest="${{ steps.find.outputs.latest }}"
          current="$(cat UPSTREAM)"
          echo "latest=$latest"    >> "$GITHUB_OUTPUT"
          echo "current=$current"  >> "$GITHUB_OUTPUT"
          if [ "$latest" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch build-release
        if: steps.compare.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = '${{ steps.compare.outputs.latest }}';
            // Don't re-dispatch a tag we already know is broken. UPSTREAM only
            // advances on a *successful* build, so a build that fails at `apply`
            // leaves UPSTREAM behind and this cron would otherwise re-dispatch
            // the same doomed build every 6h, piling identical failure comments
            // onto the drift issue. An open patch-drift issue for this tag means
            // a human still owes a patch refresh; skip until they close it.
            const title = `patch drift: build failed at ${tag}`;
            const q = `repo:${owner}/${repo} in:title is:issue is:open label:patch-drift`;
            const found = await github.rest.search.issuesAndPullRequests({ q });
            if (found.data.items.some(i => i.title === title)) {
              core.info(`Open patch-drift issue already exists for ${tag}; skipping dispatch.`);
              return;
            }
            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'build-release.yml',
              ref: context.ref,
              inputs: { upstream_tag: tag },
            });
